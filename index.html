<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario Profesional</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;}
button{cursor:pointer;font-family:'Segoe UI',sans-serif;}
input,select,textarea{font-family:'Segoe UI',sans-serif;}
input:focus,select:focus{outline:2px solid #3b82f6;border-color:#3b82f6;}
.header{background:linear-gradient(135deg,#1e40af,#1d4ed8);padding:16px 20px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.stat{background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;text-align:center;}
.stat-v{font-size:15px;font-weight:700;}
.stat-l{font-size:10px;color:rgba(255,255,255,0.7);}
.tabs{display:flex;gap:3px;margin-top:12px;background:rgba(255,255,255,0.1);border-radius:10px;padding:3px;}
.tab{flex:1;padding:8px;background:transparent;border:none;border-radius:8px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.65);cursor:pointer;}
.tab.on{background:#fff;color:#1d4ed8;}
.page{max-width:1200px;margin:0 auto;padding:16px 16px 100px;display:none;}
.page.on{display:block;}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.ch{padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:700;}
.cb{padding:14px 16px;}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.inp{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#1e293b;background:#f8fafc;}
.lbl{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;display:block;}
.field{margin-bottom:10px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
.fab{position:fixed;bottom:24px;right:24px;background:#1d4ed8;border:none;color:#fff;border-radius:50%;width:56px;height:56px;font-size:28px;box-shadow:0 4px 16px rgba(29,78,216,0.5);z-index:40;cursor:pointer;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:580px;padding:22px 18px 36px;max-height:93vh;overflow-y:auto;}
.fbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;flex-wrap:wrap;margin-bottom:12px;}
.fbtn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;}
.fbtn.on{color:#fff;}
.catrow{border-left:3px solid;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
.tip{border-left:4px solid;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
@media(min-width:640px){.stats{grid-template-columns:repeat(6,1fr);} .modal{border-radius:16px;} .modal-bg{align-items:center;padding:16px;}}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr;} .layout{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;} .sidebar{position:sticky;top:90px;}}
@media(min-width:1200px){.grid{grid-template-columns:1fr 1fr 1fr;}}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:17px;font-weight:700;color:#fff;">👜 Inventario Profesional</div>
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <button class="tab on" id="t-inv" onclick="showTab('inv')">📦 Inventario</button>
    <button class="tab" id="t-rep" onclick="showTab('rep')">📊 Reportes</button>
    <button class="tab" id="t-reg" onclick="showTab('reg')">📋 Reglas</button>
  </div>
</div>

<div class="page on" id="p-inv">
  <div class="layout">
    <div class="sidebar">
      <div class="card" style="margin-bottom:12px;">
        <div class="ch">📊 Por Categoría</div>
        <div class="cb" id="catlist" style="padding:10px 12px;"></div>
      </div>
      <div class="card">
        <div class="ch" style="color:#dc2626;">🚨 Alertas</div>
        <div class="cb" id="alertlist" style="padding:10px 12px;"></div>
      </div>
    </div>
    <div>
      <div class="fbar" id="fbar"></div>
      <input class="inp" id="search" placeholder="🔍 Buscar producto..." oninput="render()" style="margin-bottom:12px;"/>
      <div class="grid" id="lista"></div>
    </div>
  </div>
</div>

<div class="page" id="p-rep">
  <div id="rep-content"></div>
</div>

<div class="page" id="p-reg">
  <div id="reg-content"></div>
</div>

<button class="fab" id="fab" onclick="openModal()">+</button>

<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
<div class="modal" id="modal">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <div id="modal-ttl" style="font-size:16px;font-weight:700;">Producto</div>
    <button onclick="closeModal()" style="background:#f1f5f9;border:none;border-radius:20px;padding:4px 13px;font-size:13px;color:#64748b;">✕</button>
  </div>
  <div class="field">
    <span class="lbl">📸 Foto</span>
    <div id="fp" style="display:none;margin-bottom:8px;position:relative;">
      <img id="fi" src="" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;border:1px solid #e2e8f0;"/>
      <button onclick="rmPhoto()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:13px;">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <label style="display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#1d4ed8;">📷 Cámara<input type="file" accept="image/*" capture="environment" onchange="addPhoto(event)" style="display:none;"/></label>
      <label style="display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#16a34a;">🖼️ Galería<input type="file" accept="image/*" onchange="addPhoto(event)" style="display:none;"/></label>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div class="field"><span class="lbl">Código</span><input id="f-cod" class="inp" placeholder="BOL-001"/></div>
    <div class="field"><span class="lbl">Categoría</span>
      <select id="f-cat" class="inp">
        <option>Bolsos Pequeños</option><option>Bolsos Medianos</option><option>Bolsos Grandes</option>
        <option>Carteras</option><option>Monederos y Billeteras</option>
        <option>Accesorios de Moda</option><option>Accesorios para Celular</option>
        <option>Camisetas</option><option>Pantalones</option><option>Chaquetas</option>
        <option>Vestidos</option><option>Zapatos</option><option>Ropa Interior</option>
      </select>
    </div>
  </div>
  <div class="field"><span class="lbl">Nombre del producto</span><input id="f-nom" class="inp" placeholder="Ej: Bolso Tote Cuero Negro"/></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div class="field"><span class="lbl">Color / Modelo</span><input id="f-col" class="inp" placeholder="Negro"/></div>
    <div class="field"><span class="lbl">Nivel</span>
      <select id="f-niv" class="inp">
        <option value="basico">Básico</option><option value="tendencia">Tendencia</option>
        <option value="economico">Económico</option><option value="premium">Premium</option>
      </select>
    </div>
  </div>
  <div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:12px;">
    <span class="lbl" style="margin-bottom:10px;">💰 Precios y Stock</span>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;">
      <div><span class="lbl" style="color:#dc2626;">💲 Costo</span><input id="f-cos" class="inp" type="number" step="0.01" min="0" value="0" oninput="calcModal()" style="border-color:#fecaca;text-align:center;"/></div>
      <div><span class="lbl" style="color:#16a34a;">🏷️ Venta</span><input id="f-ven" class="inp" type="number" step="0.01" min="0" value="0" oninput="calcModal()" style="border-color:#bbf7d0;text-align:center;"/></div>
      <div><span class="lbl">📦 Stock</span><input id="f-stk" class="inp" type="number" min="0" value="0" oninput="calcModal()" style="text-align:center;"/></div>
    </div>
    <div><span class="lbl">⚠️ Stock mínimo</span><input id="f-min" class="inp" type="number" min="0" value="5" style="text-align:center;"/><div style="font-size:11px;color:#94a3b8;margin-top:3px;">Te avisaremos cuando bajes de este número</div></div>
  </div>
  <div id="calcs" style="background:#eff6ff;border-radius:10px;padding:12px;margin-bottom:12px;"></div>
  <div style="background:#f0fdf4;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #bbf7d0;">
    <span class="lbl" style="color:#16a34a;margin-bottom:10px;">👤 Proveedor</span>
    <div class="field"><span class="lbl">Nombre</span><input id="f-prv" class="inp" placeholder="Textiles García"/></div>
    <div class="field"><span class="lbl">Dirección</span><input id="f-dir" class="inp" placeholder="Calle, Ciudad, País"/></div>
    <div class="field"><span class="lbl">Google Maps</span><input id="f-map" class="inp" type="url" placeholder="https://maps.google.com/..."/></div>
    <div class="field" style="margin-bottom:0;"><span class="lbl">Notas</span><input id="f-not" class="inp" placeholder="Condiciones, descuentos..."/></div>
  </div>
  <button onclick="saveProduct()" style="width:100%;padding:13px;background:#1d4ed8;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;">✓ Guardar Producto</button>
</div>
</div>

<script>
var CC={"Bolsos Pequeños":"#0284c7","Bolsos Medianos":"#0891b2","Bolsos Grandes":"#166534","Carteras":"#b45309","Monederos y Billeteras":"#92400e","Accesorios de Moda":"#9333ea","Accesorios para Celular":"#0e7490","Camisetas":"#1d4ed8","Pantalones":"#16a34a","Chaquetas":"#d97706","Vestidos":"#db2777","Zapatos":"#7c3aed","Ropa Interior":"#ca8a04"};
var CI={"Bolsos Pequeños":"👜","Bolsos Medianos":"👝","Bolsos Grandes":"🛍️","Carteras":"💼","Monederos y Billeteras":"👛","Accesorios de Moda":"⌚","Accesorios para Celular":"📱","Camisetas":"👕","Pantalones":"👖","Chaquetas":"🧥","Vestidos":"👗","Zapatos":"👟","Ropa Interior":"🩲"};
var NL={basico:{l:"Básico",c:"#0284c7"},tendencia:{l:"Tendencia",c:"#db2777"},economico:{l:"Económico",c:"#16a34a"},premium:{l:"Premium",c:"#7c3aed"}};

var DEMO=[
  {id:1,cod:"BOL-001",cat:"Bolsos Pequeños",nom:"Mini Bolso Acolchado",col:"Rosa",niv:"tendencia",cos:18,ven:45,stk:12,min:5,foto:"",prv:"Distribuidora Moda",dir:"Calle 45 #12-30, Medellín",map:"",not:"Pago contraentrega"},
  {id:2,cod:"BOL-002",cat:"Bolsos Medianos",nom:"Tote Bag Canvas",col:"Beige",niv:"basico",cos:22,ven:50,stk:8,min:5,foto:"",prv:"Textiles García",dir:"Av. Principal 100, Bogotá",map:"",not:"10% descuento x10+"},
  {id:3,cod:"BOL-003",cat:"Bolsos Grandes",nom:"Bolso Shopper Cuero PU",col:"Negro",niv:"premium",cos:45,ven:110,stk:4,min:5,foto:"",prv:"Importaciones Elite",dir:"",map:"",not:"Mín. 3 unidades"},
  {id:4,cod:"CAR-001",cat:"Carteras",nom:"Cartera Crossbody Cadena",col:"Dorado",niv:"tendencia",cos:30,ven:75,stk:6,min:4,foto:"",prv:"Distribuidora Moda",dir:"",map:"",not:""},
  {id:5,cod:"MON-001",cat:"Monederos y Billeteras",nom:"Monedero Tejido Crochet",col:"Multicolor",niv:"economico",cos:8,ven:20,stk:20,min:8,foto:"",prv:"Artesanías del Norte",dir:"",map:"",not:"Hecho a mano"},
  {id:6,cod:"BOL-004",cat:"Bolsos Pequeños",nom:"Bolso Baguette Satín",col:"Vino",niv:"tendencia",cos:25,ven:60,stk:3,min:5,foto:"",prv:"Distribuidora Moda",dir:"",map:"",not:""},
  {id:7,cod:"CAR-002",cat:"Carteras",nom:"Cartera Clutch Noche",col:"Plata",niv:"premium",cos:35,ven:90,stk:5,min:3,foto:"",prv:"Importaciones Elite",dir:"",map:"",not:"Edición limitada"},
  {id:8,cod:"BOL-005",cat:"Bolsos Medianos",nom:"Bolso Bucket Ante",col:"Camel",niv:"basico",cos:28,ven:65,stk:7,min:5,foto:"",prv:"Textiles García",dir:"",map:"",not:""},
  {id:9,cod:"ACC-001",cat:"Accesorios de Moda",nom:"Reloj Mujer Minimalista",col:"Blanco/Oro",niv:"premium",cos:40,ven:95,stk:6,min:3,foto:"",prv:"Relojes Importados SA",dir:"",map:"",not:""},
  {id:10,cod:"CEL-001",cat:"Accesorios para Celular",nom:"Forro iPhone 15 Pro",col:"Transparente",niv:"economico",cos:5,ven:18,stk:25,min:10,foto:"",prv:"TechAccess",dir:"",map:"",not:""},
  {id:11,cod:"BOL-006",cat:"Bolsos Grandes",nom:"Bolso Weekender Lona",col:"Azul Marino",niv:"basico",cos:38,ven:85,stk:2,min:4,foto:"",prv:"Textiles García",dir:"",map:"",not:""},
  {id:12,cod:"MON-002",cat:"Monederos y Billeteras",nom:"Billetera Cuero Genuino",col:"Café",niv:"premium",cos:20,ven:55,stk:10,min:5,foto:"",prv:"Curtiembres El Valle",dir:"",map:"",not:""},
];

var rows=JSON.parse(localStorage.getItem('inv_final')||'null')||DEMO;
var nid=rows.length?Math.max.apply(null,rows.map(function(r){return r.id;}))+1:13;
var filtro="Todas";
var editId=null;
var photo="";

function $(id){return document.getElementById(id);}
function money(n){return"$"+Math.abs(Number(n)).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");}
function pct(g,c){return c>0?Math.round(g/c*100):0;}
function cr(r){var g=r.ven-r.cos;return{g:g,inv:r.stk*r.cos,gt:r.stk*g,m:pct(g,r.cos)};}
function save(){localStorage.setItem('inv_final',JSON.stringify(rows));}

// TAB SWITCHING
function showTab(t){
  ['inv','rep','reg'].forEach(function(x){
    $('p-'+x).classList[x===t?'add':'remove']('on');
    $('t-'+x).classList[x===t?'add':'remove']('on');
  });
  $('fab').style.display=t==='inv'?'flex':'none';
  if(t==='rep')buildRep();
  if(t==='reg')buildReg();
}

// FILTER
function sf(cat){
  filtro=cat;
  render();
}

// RENDER
function render(){
  // Stats
  var ts=rows.reduce(function(a,r){return a+r.stk;},0);
  var ti=rows.reduce(function(a,r){return a+cr(r).inv;},0);
  var tg=rows.reduce(function(a,r){return a+cr(r).gt;},0);
  var al=rows.filter(function(r){return r.stk<=r.min;}).length;
  var mp=rows.length?Math.round(rows.reduce(function(a,r){return a+cr(r).m;},0)/rows.length):0;
  $('stats').innerHTML=
    '<div class="stat"><div class="stat-v" style="color:#38bdf8;">'+rows.length+'</div><div class="stat-l">Productos</div></div>'+
    '<div class="stat"><div class="stat-v" style="color:#86efac;">'+ts+'</div><div class="stat-l">Unidades</div></div>'+
    '<div class="stat"><div class="stat-v" style="color:#fde68a;">'+money(ti)+'</div><div class="stat-l">Inversión</div></div>'+
    '<div class="stat"><div class="stat-v" style="color:#6ee7b7;">'+money(tg)+'</div><div class="stat-l">Ganancia</div></div>'+
    '<div class="stat"><div class="stat-v" style="color:#c4b5fd;">'+mp+'%</div><div class="stat-l">Margen</div></div>'+
    '<div class="stat"><div class="stat-v" style="color:'+(al>0?'#fca5a5':'#86efac')+';">'+al+'</div><div class="stat-l">Alertas</div></div>';

  // Category list
  var bc={};
  rows.forEach(function(r){
    if(!bc[r.cat])bc[r.cat]={n:0,inv:0,gt:0};
    var c=cr(r);bc[r.cat].n++;bc[r.cat].inv+=c.inv;bc[r.cat].gt+=c.gt;
  });
  var tiv=rows.reduce(function(a,r){return a+cr(r).inv;},0);
  var cl='';
  Object.keys(bc).sort(function(a,b){return bc[b].gt-bc[a].gt;}).forEach(function(cat){
    var t=bc[cat];
    var col=CC[cat]||'#64748b';
    var ic=CI[cat]||'📦';
    var p=tiv>0?Math.round(t.inv/tiv*100):0;
    var act=filtro===cat;
    cl+='<div onclick="sf(\''+cat+'\')" style="margin-bottom:8px;padding:10px;background:'+(act?col+'18':'#f8fafc')+';border:1px solid '+(act?col:'#e2e8f0')+';border-left:3px solid '+col+';border-radius:8px;cursor:pointer;">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:2px;">'+
      '<span style="font-size:12px;font-weight:700;color:'+col+';">'+ic+' '+cat+'</span>'+
      '<span style="font-size:12px;font-weight:700;color:#7c3aed;">+'+money(t.gt)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px;">'+
      '<span style="font-size:11px;color:#64748b;">'+t.n+' prod.</span>'+
      '<span style="font-size:11px;color:#64748b;">Inv: '+money(t.inv)+'</span></div>'+
      '<div style="height:4px;background:#e2e8f0;border-radius:2px;"><div style="height:100%;width:'+p+'%;background:'+col+';border-radius:2px;"></div></div>'+
      '</div>';
  });
  cl+='<div onclick="sf(\'Todas\')" style="padding:8px 10px;background:'+(filtro==='Todas'?'#dbeafe':'#f0fdf4')+';border:1px solid '+(filtro==='Todas'?'#93c5fd':'#bbf7d0')+';border-radius:8px;display:flex;justify-content:space-between;cursor:pointer;">'+
    '<span style="font-size:11px;font-weight:700;color:#1d4ed8;">🏁 Total General</span>'+
    '<span style="font-size:12px;font-weight:700;color:#7c3aed;">+'+money(tg)+'</span></div>';
  $('catlist').innerHTML=cl;

  // Alerts
  var ba=rows.filter(function(r){return r.stk<=r.min;});
  var al2='';
  if(ba.length===0){al2='<div style="text-align:center;padding:10px;color:#16a34a;font-size:13px;">✅ Todo en orden</div>';}
  else{ba.forEach(function(r){
    var lv=r.stk===0?'red':'yellow';
    al2+='<div style="border-left:3px solid '+(lv==='red'?'#fecaca':'#fde68a')+';background:'+(lv==='red'?'#fff5f5':'#fffbeb')+';border-radius:6px;padding:8px 10px;margin-bottom:6px;">'+
      '<div style="font-size:12px;font-weight:700;color:'+(lv==='red'?'#dc2626':'#d97706')+';">'+r.nom+'</div>'+
      '<div style="font-size:11px;color:#64748b;">Stock: <b>'+r.stk+'</b> / Mín: '+r.min+' — '+(r.stk===0?'⛔ Sin stock':'⚠️ Reponer')+'</div></div>';
  });}
  $('alertlist').innerHTML=al2;

  // Filter buttons
  var cats=['Todas'];
  rows.forEach(function(r){if(cats.indexOf(r.cat)===-1)cats.push(r.cat);});
  var fb='';
  cats.forEach(function(c){
    var col=CC[c]||'#3b82f6';
    var act=filtro===c;
    fb+='<button class="fbtn'+(act?' on':'')+'" onclick="sf(\''+c+'\')" style="'+(act?'background:'+col+';border-color:'+col+';color:#fff;':'')+'">'+
      (CI[c]||'')+' '+c+'</button>';
  });
  $('fbar').innerHTML=fb;

  // Products
  var q=($('search')||{value:''}).value.toLowerCase();
  var vis=filtro==='Todas'?rows:rows.filter(function(r){return r.cat===filtro;});
  if(q)vis=vis.filter(function(r){return r.nom.toLowerCase().indexOf(q)>-1||r.cod.toLowerCase().indexOf(q)>-1||r.col.toLowerCase().indexOf(q)>-1;});

  if(vis.length===0){$('lista').innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8;grid-column:1/-1;">No hay productos.</div>';return;}

  $('lista').innerHTML=vis.map(function(r){
    var c=cr(r);
    var col=CC[r.cat]||'#64748b';
    var ic=CI[r.cat]||'📦';
    var nv=NL[r.niv]||NL.basico;
    var sc=r.stk===0?'#dc2626':r.stk<=r.min?'#d97706':'#16a34a';
    return '<div class="card">'+
      (r.foto?'<img src="'+r.foto+'" style="width:100%;height:160px;object-fit:cover;"/>':'')+
      '<div style="border-left:4px solid '+col+';padding:12px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'+
      '<div style="flex:1;margin-right:8px;">'+
      '<div style="font-size:11px;color:#94a3b8;">'+r.cod+'</div>'+

// PHOTO
function addPhoto(e){
  var f=e.target.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var cv=document.createElement('canvas');
      var M=600,w=img.width,h=img.height;
      if(w>M){h=Math.round(h*M/w);w=M;}
      if(h>M){w=Math.round(w*M/h);h=M;}
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      photo=cv.toDataURL('image/jpeg',0.7);
      $('fi').src=photo;$('fp').style.display='block';
    };img.src=ev.target.result;
  };rd.readAsDataURL(f);
}
function rmPhoto(){photo='';$('fi').src='';$('fp').style.display='none';}

// MODAL CALC
function calcModal(){
  var c=parseFloat($('f-cos').value)||0;
  var v=parseFloat($('f-ven').value)||0;
  var s=parseInt($('f-stk').value)||0;
  var g=v-c,m=c>0?Math.round(g/c*100):0,inv=s*c,gt=s*g;
  var bw=Math.min(Math.max(m,0),100);
  var bc=m>=60?'#16a34a':m>=30?'#d97706':'#dc2626';
  var st=m>=60?'✅ Excelente':m>=40?'👍 Aceptable':m>=20?'⚠️ Bajo':'❌ Muy bajo';
  $('calcs').innerHTML=
    '<div style="font-size:11px;font-weight:700;color:#1d4ed8;margin-bottom:10px;text-transform:uppercase;">🧮 Cálculo en tiempo real</div>'+
    '<div style="background:#fff;border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #e2e8f0;">'+
    '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;">'+
    '<span style="font-size:12px;color:#64748b;">Venta</span><span style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:3px 8px;font-size:13px;font-weight:700;color:#16a34a;">'+money(v)+'</span>'+
    '<span style="color:#94a3b8;">−</span>'+
    '<span style="font-size:12px;color:#64748b;">Costo</span><span style="background:#fff5f5;border:1px solid #fecaca;border-radius:6px;padding:3px 8px;font-size:13px;font-weight:700;color:#dc2626;">'+money(c)+'</span>'+
    '<span style="color:#94a3b8;">=</span>'+
    '<span style="font-size:12px;color:#64748b;">Ganancia/u</span><span style="background:#faf5ff;border:1px solid #e9d5ff;border-radius:6px;padding:3px 8px;font-size:13px;font-weight:700;color:#7c3aed;">'+money(g)+'</span></div>'+
    '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'+
    '<span style="font-size:12px;color:#64748b;">Gan/u</span><span style="background:#faf5ff;border:1px solid #e9d5ff;border-radius:6px;padding:3px 8px;font-size:13px;font-weight:700;color:#7c3aed;">'+money(g)+'</span>'+
    '<span style="color:#94a3b8;">×</span>'+
    '<span style="font-size:12px;color:#64748b;">Stock</span><span style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:3px 8px;font-size:13px;font-weight:700;color:#1d4ed8;">'+s+'</span>'+
    '<span style="color:#94a3b8;">=</span>'+
    '<span style="font-size:12px;color:#64748b;">Ganancia Total</span><span style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:3px 8px;font-size:13px;font-weight:700;color:#16a34a;">+'+money(gt)+'</span></div>'+
    '</div>'+
    '<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #e2e8f0;">'+
    '<div style="display:flex;justify-content:space-between;margin-bottom:8px;">'+
    '<div><div style="font-size:11px;font-weight:700;color:#64748b;">MARGEN DE GANANCIA</div><div style="font-size:11px;color:#94a3b8;">Por cada $1 invertido ganas $'+(c>0?(g/c).toFixed(2):'0')+' extra</div></div>'+
    '<div style="text-align:right;"><div style="font-size:24px;font-weight:700;color:'+bc+';">'+m+'%</div><div style="font-size:11px;color:'+bc+';font-weight:600;">'+st+'</div></div></div>'+
    '<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;"><div style="height:100%;width:'+bw+'%;background:'+bc+';border-radius:5px;"></div></div>'+
    '</div>'+
    (m<60&&c>0?'<div style="margin-top:8px;font-size:11px;color:#d97706;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px;">💡 Precio de venta sugerido para 60% de margen: <b>'+money(c*2.5)+'</b></div>':'');

// MODAL
function openModal(){
  editId=null;photo='';
  $('modal-ttl').textContent='Agregar Producto';
  ['f-cod','f-nom','f-col','f-prv','f-dir','f-map','f-not'].forEach(function(i){$(i).value='';});
  $('f-cos').value=0;$('f-ven').value=0;$('f-stk').value=0;$('f-min').value=5;
  $('fp').style.display='none';$('fi').src='';
  var n=rows.length?Math.max.apply(null,rows.map(function(r){return parseInt(r.cod.replace(/\D/g,'')||0);})):0;
  $('f-cod').value='BOL-'+String(n+1).padStart(3,'0');
  calcModal();
  $('modal-bg').classList.add('on');
  document.body.style.overflow='hidden';
}

function editRow(id){
  var r=rows.filter(function(x){return x.id===id;})[0];
  if(!r)return;
  editId=id;photo=r.foto||'';
  $('modal-ttl').textContent='Editar Producto';
  $('f-cod').value=r.cod||'';$('f-cat').value=r.cat;$('f-nom').value=r.nom;
  $('f-col').value=r.col||'';$('f-niv').value=r.niv||'basico';
  $('f-cos').value=r.cos;$('f-ven').value=r.ven;$('f-stk').value=r.stk;$('f-min').value=r.min||5;
  $('f-prv').value=r.prv||'';$('f-dir').value=r.dir||'';$('f-map').value=r.map||'';$('f-not').value=r.not||'';
  if(r.foto){$('fi').src=r.foto;$('fp').style.display='block';}else{$('fp').style.display='none';}
  calcModal();
  $('modal-bg').classList.add('on');
  document.body.style.overflow='hidden';
}

function closeModal(){$('modal-bg').classList.remove('on');document.body.style.overflow='';}
function bgClick(e){if(e.target===$('modal-bg'))closeModal();}

function saveProduct(){
  var nom=$('f-nom').value.trim();
  if(!nom){alert('Ingresa el nombre del producto.');return;}
  var p={cod:$('f-cod').value.trim(),cat:$('f-cat').value,nom:nom,col:$('f-col').value.trim(),niv:$('f-niv').value,
    cos:parseFloat($('f-cos').value)||0,ven:parseFloat($('f-ven').value)||0,stk:parseInt($('f-stk').value)||0,
    min:parseInt($('f-min').value)||5,foto:photo,prv:$('f-prv').value.trim(),dir:$('f-dir').value.trim(),
    map:$('f-map').value.trim(),not:$('f-not').value.trim()};
  if(editId){rows=rows.map(function(r){return r.id===editId?Object.assign({},p,{id:editId}):r;});}
  else{p.id=nid++;rows.push(p);}
  save();closeModal();render();
}

function delRow(id){
  if(!confirm('¿Eliminar este producto?'))return;
  rows=rows.filter(function(r){return r.id!==id;});
  save();render();
}

render();
